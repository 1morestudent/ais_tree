<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Safety Navigator</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" href="favicon-64.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --nord-bg:        #2E3440;
    --nord-bg-2:      #3B4252;
    --nord-bg-3:      #434C5E;
    --nord-bg-4:      #4C566A;
    --nord-fg:        #ECEFF4;
    --nord-fg-2:      #E5E9F0;
    --nord-fg-dim:    #D8DEE9;
    --nord-muted:     #8a93a4;
    --frost-1:        #8FBCBB;
    --frost-2:        #88C0D0;
    --pop-1:          #5EE6D8;
    --pop-2:          #36C5C0;
  }
  html, body {
    margin: 0; padding: 0;
    background: #262b35;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--nord-fg);
  }

  /* ── Desktop ─────────────────────────────────────────── */
  @media (min-width: 768px) {
    html, body { overflow: hidden; }
    #mobile-page { display: none !important; }
  }
  /* Hero is designed at 1440 × 900 — wrapper scales it to fit any viewport */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: radial-gradient(ellipse at 50% 30%, #353c4a 0%, #2E3440 55%, #262b35 100%);
  }
  #hero {
    width: 100%;
    height: 100%;
  }

  /* ── Mobile ──────────────────────────────────────────── */
  @media (max-width: 767px) {
    * { box-sizing: border-box; }
    #stage { display: none !important; }
    body {
      background: radial-gradient(ellipse at 50% 25%, #353c4a 0%, #2E3440 60%, #262b35 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    #mobile-page {
      display: flex;
      flex-direction: column;
      flex: 1;
      position: relative;
    }
    .m-topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top, 0));
    }
    .m-brand { display: flex; align-items: center; gap: 8px; }
    .m-brand-name {
      font-weight: 600; font-size: 14px; letter-spacing: 0.2px;
      color: var(--nord-fg-2);
    }
    .m-hamburger { background: transparent; border: none; padding: 8px; cursor: pointer; color: var(--nord-fg-dim); display: flex; align-items: center; }
    .m-mobile-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 50; background: #3B4252; border-bottom: 1px solid rgba(143,188,187,0.15); }
    .m-mobile-menu a { display: block; padding: 14px 24px; color: var(--nord-fg-dim); font-family: 'Inter', sans-serif; font-size: 15px; text-decoration: none; }
    .m-mobile-menu.open { display: block; }
    .m-hero {
      flex: 1;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 22px 70px;
      gap: 22px;
    }
    .m-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--nord-muted);
    }
    .m-headline {
      margin: 0;
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 500; font-size: 52px; line-height: 1.02;
      letter-spacing: -1.2px; color: var(--nord-fg); text-wrap: pretty;
    }
    .m-headline .accent { color: var(--pop-1); }
    .m-subhead {
      margin: 0; font-size: 16px; line-height: 1.5;
      color: var(--nord-fg-dim); opacity: 0.85; text-wrap: pretty;
    }
    .m-cta-wrap { position: relative; margin-top: 8px; }
    .m-cta-glow {
      position: absolute;
      left: -10px; right: -10px; top: -14px; bottom: -14px;
      background: radial-gradient(ellipse at center, rgba(94,230,216,0.4) 0%, transparent 70%);
      filter: blur(20px); pointer-events: none;
    }
    .m-cta {
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 18px 24px; border-radius: 999px;
      background: linear-gradient(180deg, #6FF0E1 0%, #36C5C0 100%);
      color: #0d1f24; font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 16px; letter-spacing: 0.1px;
      text-decoration: none;
      box-shadow: 0 14px 40px -8px rgba(94,230,216,0.65),
                  0 0 0 1px rgba(120,245,230,0.55) inset;
    }
    .m-horizon {
      position: absolute; left: 22px; right: 22px; bottom: 80px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(143,188,187,0.22) 30%,
                                  rgba(143,188,187,0.22) 70%, transparent 100%);
    }
    .m-ticks {
      position: absolute; left: 22px; right: 22px; bottom: 80px;
      display: flex; justify-content: space-between; pointer-events: none;
    }
    .m-tick { width: 1px; background: rgba(143,188,187,0.3); transform: translateY(-2px); height: 5px; }
    .m-tick.major { height: 12px; }
    .m-footer {
      padding: 16px 22px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px dashed rgba(143,188,187,0.18);
      color: var(--nord-muted); font-family: 'JetBrains Mono', monospace;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    }
  }
  /* Larger phones — slight scale-up */
  @media (min-width: 420px) and (max-width: 767px) {
    .m-headline { font-size: 56px; }
    .m-subhead { font-size: 17px; }
    .m-hero { padding: 0 28px 80px; }
  }
</style>
</head>
<body>

<!-- Mobile layout (hidden on ≥768px) -->
<div id="mobile-page">
  <header class="m-topbar">
    <div class="m-brand">
      <svg width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#5EE6D8" stroke-width="1.5" opacity="0.55" />
        <circle cx="16" cy="16" r="7" fill="none" stroke="#5EE6D8" stroke-width="1.5" />
        <line x1="16" y1="2" x2="16" y2="6" stroke="#5EE6D8" stroke-width="1.5" />
        <line x1="16" y1="26" x2="16" y2="30" stroke="#5EE6D8" stroke-width="1.5" />
        <line x1="2" y1="16" x2="6" y2="16" stroke="#5EE6D8" stroke-width="1.5" />
        <line x1="26" y1="16" x2="30" y2="16" stroke="#5EE6D8" stroke-width="1.5" />
        <circle cx="20.5" cy="11.5" r="2" fill="#5EE6D8" />
      </svg>
      <span class="m-brand-name">AI Safety Navigator</span>
    </div>
    <button class="m-hamburger" id="m-hamburger" aria-label="Open menu">
      <svg id="m-icon-open" width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 6.5h16M3 11h16M3 15.5h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <svg id="m-icon-close" width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:none"><path d="M5 5l12 12M17 5L5 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="m-mobile-menu" id="m-mobile-menu">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </header>
  <script>
    var btn = document.getElementById('m-hamburger');
    var menu = document.getElementById('m-mobile-menu');
    var iconOpen = document.getElementById('m-icon-open');
    var iconClose = document.getElementById('m-icon-close');
    btn.addEventListener('click', function() {
      var open = menu.classList.toggle('open');
      iconOpen.style.display = open ? 'none' : '';
      iconClose.style.display = open ? '' : 'none';
    });
  </script>

  <main class="m-hero">
    <h1 class="m-headline">
      Find your next step in <span class="accent">AI&nbsp;safety</span>.
    </h1>
    <p class="m-subhead">
      A filterable directory of opportunities, built to help you find the
      ones that fit your background, hours and timeline.
    </p>
    <div class="m-cta-wrap">
      <div class="m-cta-glow"></div>
      <a class="m-cta" href="navigator.html">
        <span>Open the Navigator</span>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M3.5 9h11M10 4.5L14.5 9 10 13.5" stroke="#0d1f24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </div>
  </main>

  <div class="m-horizon"></div>
  <div class="m-ticks">
    <span class="m-tick"></span><span class="m-tick"></span><span class="m-tick"></span>
    <span class="m-tick"></span><span class="m-tick major"></span><span class="m-tick"></span>
    <span class="m-tick"></span><span class="m-tick"></span><span class="m-tick"></span>
  </div>

  <footer class="m-footer">
    <a href="https://safeaigermany.org/incubator" target="_blank" rel="noopener noreferrer"
       style="opacity:.7; color:inherit; text-decoration:none;">maintained by saige incubator · 2026</a>
  </footer>
</div>

<!-- Desktop layout (hidden on <768px) -->
<div id="stage"><div id="hero"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">

function BrandMark({ size = 28, color = 'var(--pop-1)' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={{ display: 'block' }}>
      <circle cx="16" cy="16" r="13" fill="none" stroke={color} strokeWidth="1.5" opacity="0.55" />
      <circle cx="16" cy="16" r="7" fill="none" stroke={color} strokeWidth="1.5" />
      <line x1="16" y1="2" x2="16" y2="6" stroke={color} strokeWidth="1.5" />
      <line x1="16" y1="26" x2="16" y2="30" stroke={color} strokeWidth="1.5" />
      <line x1="2" y1="16" x2="6" y2="16" stroke={color} strokeWidth="1.5" />
      <line x1="26" y1="16" x2="30" y2="16" stroke={color} strokeWidth="1.5" />
      <circle cx="20.5" cy="11.5" r="2" fill={color} />
    </svg>
  );
}

function BrandLockup() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <BrandMark />
      <span style={{
        fontFamily: 'Inter, sans-serif',
        fontWeight: 600, fontSize: 16, letterSpacing: 0.2,
        color: 'var(--nord-fg-2)',
      }}>AI Safety Navigator</span>
    </div>
  );
}

function PrimaryCTA({ children, style = {} }) {
  return (
    <a href="navigator.html" style={{
      display: 'inline-flex', alignItems: 'center', gap: 12,
      padding: '20px 36px',
      borderRadius: 999,
      background: 'linear-gradient(180deg, #6FF0E1 0%, #36C5C0 100%)',
      color: '#0d1f24',
      fontFamily: 'Inter, sans-serif',
      fontWeight: 600, fontSize: 17, letterSpacing: 0.1,
      textDecoration: 'none',
      boxShadow: '0 14px 40px -8px rgba(94, 230, 216, 0.65), 0 0 0 1px rgba(120, 245, 230, 0.55) inset',
      ...style,
    }}>
      <span>Open the Navigator</span>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3.5 9h11M10 4.5L14.5 9 10 13.5" stroke="#0d1f24" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    </a>
  );
}

function Eyebrow({ children }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '6px 12px',
      borderRadius: 999,
      border: '1px solid rgba(143, 188, 187, 0.3)',
      background: 'rgba(143, 188, 187, 0.06)',
      color: 'var(--frost-1)',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--frost-1)' }} />
      {children}
    </div>
  );
}

// Shared horizontal padding — gives ~210px margins at 1920px, shrinks naturally below that.
const CP = 'max(24px, calc(50vw - 660px))';

function TopNav() {
  const linkStyle = {
    color: 'var(--nord-fg-dim)', fontFamily: 'Inter, sans-serif',
    fontSize: 14, opacity: 0.75, cursor: 'pointer', textDecoration: 'none',
  };
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '1fr auto 1fr',
      alignItems: 'center',
      paddingTop: 24, paddingBottom: 24,
      paddingLeft: CP, paddingRight: CP,
    }}>
      <div style={{ justifySelf: 'start' }}>
        <BrandLockup />
      </div>
      <div style={{
        justifySelf: 'center',
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 11, letterSpacing: 1.4, textTransform: 'uppercase',
        color: 'var(--nord-muted)',
      }}>
        Updated weekly
      </div>
      <div style={{ justifySelf: 'end', display: 'flex', alignItems: 'center', gap: 28 }}>
        <a href="about.html" style={linkStyle}>About</a>
        <a href="contact.html" style={linkStyle}>Contact</a>
      </div>
    </div>
  );
}

function BelowFoldHint() {
  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0,
      paddingTop: 20, paddingBottom: 20,
      paddingLeft: CP, paddingRight: CP,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      borderTop: '1px dashed rgba(143, 188, 187, 0.18)',
      color: 'var(--nord-muted)',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11, letterSpacing: 1, textTransform: 'uppercase',
    }}>
      <a href="https://safeaigermany.org/incubator" target="_blank" rel="noopener noreferrer" style={{ opacity: 0.7, color: 'inherit', textDecoration: 'none' }}>maintained by saige incubator · 2026</a>
    </div>
  );
}

function Hero() {

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100vh',
      background: 'transparent',
      overflow: 'hidden',
      fontFamily: 'Inter, sans-serif',
      display: 'flex', flexDirection: 'column',
    }}>
      <TopNav />

      {/* Vertically centered hero content */}
      <div style={{
        flex: 1,
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        paddingLeft: CP, paddingRight: CP,
        paddingBottom: 'clamp(40px, 6vh, 80px)',
      }}>
        <div style={{
          display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 'clamp(20px, 2vh, 32px)',
        }}>
          <h1 style={{
            margin: 0,
            fontFamily: "'Source Serif 4', 'Source Serif Pro', Georgia, serif",
            fontWeight: 500, fontSize: 'clamp(40px, 6.5vw, 100px)', lineHeight: 1.02, letterSpacing: '-0.02em',
            color: 'var(--nord-fg)', maxWidth: 1100, textWrap: 'pretty',
          }}>
            Find your next step <br />
            in <span style={{ color: 'var(--pop-1)' }}>AI&nbsp;safety</span>.
          </h1>

          <p style={{
            margin: 0, fontSize: 'clamp(16px, 1.4vw, 22px)', lineHeight: 1.5,
            color: 'var(--nord-fg-dim)', maxWidth: 'clamp(320px, 40vw, 640px)', textWrap: 'pretty', opacity: 0.85,
          }}>
            A filterable directory of opportunities, built to help you find
            the ones that fit your background, hours and timeline.
          </p>

          <div style={{ display: 'flex', alignItems: 'center', gap: 24, marginTop: 'clamp(12px, 1.5vh, 24px)', position: 'relative' }}>
            <div style={{
              position: 'absolute', left: -28, top: -16, bottom: -16,
              width: 320,
              background: 'radial-gradient(ellipse at center, rgba(94,230,216,0.38) 0%, transparent 70%)',
              filter: 'blur(22px)', pointerEvents: 'none',
            }} />
            <PrimaryCTA />
          </div>
        </div>
      </div>

      {/* Horizon hairline just above the footer band */}
      <div style={{
        position: 'absolute', left: CP, right: CP, bottom: 'clamp(60px, 8vh, 120px)', height: 1,
        background: 'linear-gradient(90deg, transparent 0%, rgba(143,188,187,0.22) 30%, rgba(143,188,187,0.22) 70%, transparent 100%)',
      }} />
      <div style={{
        position: 'absolute', left: CP, right: CP, bottom: 'clamp(60px, 8vh, 120px)',
        display: 'flex', justifyContent: 'space-between', pointerEvents: 'none',
      }}>
        {Array.from({ length: 13 }).map((_, i) => (
          <div key={i} style={{
            width: 1, height: i === 6 ? 14 : 6,
            background: 'rgba(143,188,187,0.3)',
            transform: 'translateY(-2px)',
          }} />
        ))}
      </div>

      <BelowFoldHint />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('hero')).render(<Hero />);

</script>
</body>
</html>
