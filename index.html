<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS-tree - AI Safety Resources Directory</title>
    <link rel="icon" type="image/png" href="favicon-64.png">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nord: {
                            0: '#2E3440',
                            1: '#3B4252',
                            2: '#434C5E',
                            3: '#4C566A',
                            4: '#D8DEE9',
                            5: '#E5E9F0',
                            6: '#ECEFF4',
                            7: '#8FBCBB',
                            8: '#88C0D0',
                            9: '#81A1C1',
                            10: '#5E81AC',
                            11: '#BF616A',
                            12: '#D08770',
                            13: '#EBCB8B',
                            14: '#A3BE8C',
                            15: '#B48EAD',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #2E3440; }
    </style>
</head>
<body class="bg-nord-0 min-h-screen text-nord-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Constants for ordered filters
        const DURATION_ORDER = ['1-4 weeks', '1-3 months', '3-6 months', '6-12 months', 'Ongoing/variable'];
        const TIME_ORDER = ['<5 hrs/week', '5-10 hrs/week', '10-20 hrs/week', 'Full-time'];

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtkO0KybXq6Nh_PT8Q17V-KJD_6y6YDpgAOcru0ddJ3uaW98Eb4vJX2QTI-A1oXvubXcvLtsPnfhjg/pub?gid=0&single=true&output=csv';

        // Parse CSV text into array of objects
        function parseCSV(text) {
            const lines = text.split('\n');
            if (lines.length === 0) return [];
            const headers = parseCSVLine(lines[0]);
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const values = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((header, idx) => {
                    row[header.trim()] = values[idx] || '';
                });
                data.push(row);
            }
            return data;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        // Track badge component
        function TrackBadge({ track }) {
            const colors = {
                'Technical': 'bg-[#B48EAD] text-nord-0',
                'Governance': 'bg-[#EBCB8B] text-nord-0',
                'Both': 'bg-[#81A1C1] text-nord-0',
                'General': 'bg-nord-3 text-nord-4'
            };
            return (
                <span className={`px-2 py-1 rounded-full text-xs font-medium ${colors[track] || colors['General']}`}>
                    {track || 'General'}
                </span>
            );
        }

        // Resource card component
        function ResourceCard({ item }) {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className="bg-nord-1 rounded-lg border border-nord-2 p-4 mb-3">
                    <div className="cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex flex-wrap items-start justify-between gap-2">
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 flex-wrap">
                                    <h3 className="font-semibold text-nord-6">{item.name}</h3>
                                    <TrackBadge track={item.track} />
                                </div>
                                <p className="text-sm text-nord-4 mt-1">{item.organization}</p>
                            </div>
                            <div className="text-right text-sm text-nord-4">
                                <div>{item.format}</div>
                                <div>{item.duration}</div>
                                <div>{item.time_commitment}</div>
                            </div>
                        </div>
                        <div className="mt-3 flex items-center justify-between">
                            <span className="text-sm font-medium text-nord-8 hover:text-nord-7">
                                {expanded ? '▲ Hide details' : '▼ More info'}
                            </span>
                            {item.url && item.url !== '[unclear]' ? (
                                <a
                                    href={item.url}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-sm text-nord-8 hover:text-nord-7 hover:underline font-medium"
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    Visit Program →
                                </a>
                            ) : (
                                <span></span>
                            )}
                        </div>
                    </div>

                    {expanded && (
                        <div className="mt-4 pt-4 border-t border-nord-2 space-y-3 text-sm">
                            {item.description && (
                                <div>
                                    <span className="font-medium text-nord-5">Description: </span>
                                    <span className="text-nord-4">{item.description}</span>
                                </div>
                            )}
                            {item.career_stage && (
                                <div>
                                    <span className="font-medium text-nord-5">Career Stage: </span>
                                    <span className="text-nord-4">{item.career_stage}</span>
                                </div>
                            )}
                            {item.geographic_focus && (
                                <div>
                                    <span className="font-medium text-nord-5">Geographic Focus: </span>
                                    <span className="text-nord-4">{item.geographic_focus}</span>
                                </div>
                            )}
                            {item.prerequisites && item.prerequisites !== 'None' && (
                                <div>
                                    <span className="font-medium text-nord-5">Prerequisites: </span>
                                    <span className="text-nord-4">{item.prerequisites}</span>
                                </div>
                            )}
                            {item.application_status && (
                                <div>
                                    <span className="font-medium text-nord-5">Application Status: </span>
                                    <span className="text-nord-4">{item.application_status}</span>
                                </div>
                            )}
                            {item.recompensation && item.recompensation !== '0' && item.recompensation !== '[unclear]' && (
                                <div>
                                    <span className="font-medium text-nord-5">Compensation: </span>
                                    <span className="text-nord-4">{item.recompensation}</span>
                                </div>
                            )}
                            {item.notes && (
                                <div>
                                    <span className="font-medium text-nord-5">Notes: </span>
                                    <span className="text-nord-4">{item.notes}</span>
                                </div>
                            )}
                            {item.url && item.url !== '[unclear]' && (
                                <div>
                                    <a
                                        href={item.url}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="text-nord-8 hover:text-nord-7 hover:underline"
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        Visit Program →
                                    </a>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Filter section component (multi-select pills)
        function FilterSection({ label, options, selected, onChange }) {
            const toggleOption = (option) => {
                if (selected.includes(option)) {
                    onChange(selected.filter(s => s !== option));
                } else {
                    onChange([...selected, option]);
                }
            };

            return (
                <div className="mb-4">
                    <label className="block text-sm font-medium text-nord-5 mb-2">{label}</label>
                    <div className="flex flex-wrap gap-2">
                        {options.map(option => (
                            <button
                                key={option}
                                onClick={() => toggleOption(option)}
                                className={`px-3 py-1.5 rounded-full text-sm transition-colors ${
                                    selected.includes(option)
                                        ? 'bg-nord-8 text-nord-0'
                                        : 'bg-nord-2 text-nord-4 hover:bg-nord-3'
                                }`}
                            >
                                {option}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // Upper bound filter component
        function UpperBoundFilter({ label, options, selected, onChange }) {
            return (
                <div className="mb-4">
                    <label className="block text-sm font-medium text-nord-5 mb-2">{label}</label>
                    <div className="flex flex-wrap gap-2">
                        {options.map(option => (
                            <button
                                key={option}
                                onClick={() => onChange(selected === option ? null : option)}
                                className={`px-3 py-1.5 rounded-full text-sm transition-colors ${
                                    selected === option
                                        ? 'bg-nord-14 text-nord-0'
                                        : 'bg-nord-2 text-nord-4 hover:bg-nord-3'
                                }`}
                            >
                                ≤ {option}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // Helper to format duration labels (e.g., "1-3 months" -> "3 months")
        function formatDurationLabel(duration) {
            const match = duration.match(/(\d+)-(\d+)\s*(\w+)/);
            if (match) {
                return `${match[2]} ${match[3]}`;
            }
            if (duration === 'Ongoing/variable') return 'Ongoing';
            return duration;
        }

        // Single question component (used within groups)
        function QuestionBlock({ question, options, selected, onSelect, onClear, isMulti = true, isUpperBound = false, showNoPreference = true }) {
            const hasSelection = isMulti ? selected.length > 0 : selected !== null;

            return (
                <div className="mb-8">
                    <h3 className="text-xl font-bold text-nord-6 mb-4">{question}</h3>
                    <div className="flex flex-wrap justify-center items-center gap-3">
                        {options.map(option => {
                            const isSelected = isMulti
                                ? selected.includes(option)
                                : selected === option;
                            const displayLabel = isUpperBound ? formatDurationLabel(option) : option;
                            return (
                                <button
                                    key={option}
                                    onClick={() => onSelect(option)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                        isSelected
                                            ? 'bg-nord-8 text-nord-0 shadow-md scale-105'
                                            : 'bg-nord-1 text-nord-4 border border-nord-3 hover:border-nord-8 hover:shadow'
                                    }`}
                                >
                                    {isUpperBound ? `≤ ${displayLabel}` : displayLabel}
                                </button>
                            );
                        })}
                        {showNoPreference && (
                            <>
                                {/* Vertical separator */}
                                <div className="w-px h-8 bg-nord-3 mx-1"></div>
                                {/* No preference button */}
                                <button
                                    onClick={onClear}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                        !hasSelection
                                            ? 'bg-nord-3 text-nord-6 shadow-md'
                                            : 'bg-nord-1 text-nord-4 border border-nord-3 hover:border-nord-8 hover:shadow'
                                    }`}
                                >
                                    No preference
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // Grouped questionnaire step component
        function QuestionGroupStep({ questions, onSelectFor, onClearFor, onNext, onBack, canGoBack, matchCount, totalCount }) {
            return (
                <div className="max-w-2xl mx-auto text-center">
                    {questions.map((q, idx) => (
                        <QuestionBlock
                            key={idx}
                            question={q.question}
                            options={q.options}
                            selected={q.filter}
                            onSelect={(option) => onSelectFor(idx, option)}
                            onClear={() => onClearFor(idx)}
                            isMulti={q.isMulti}
                            isUpperBound={q.isUpperBound}
                            showNoPreference={q.showNoPreference !== false}
                        />
                    ))}
                    <p className="text-nord-4 mb-4">
                        <span className="font-semibold text-nord-6">{matchCount}</span> of {totalCount} programs match
                    </p>
                    <div className="flex justify-center gap-4 mt-8">
                        {canGoBack && (
                            <button
                                onClick={onBack}
                                className="px-6 py-2 bg-nord-1 text-nord-4 border border-nord-3 rounded-lg hover:bg-nord-2 transition-colors"
                            >
                                ← Back
                            </button>
                        )}
                        <button
                            onClick={onNext}
                            className="px-6 py-2 bg-nord-8 text-nord-0 rounded-lg hover:bg-nord-9 transition-colors"
                        >
                            Next →
                        </button>
                    </div>
                </div>
            );
        }

        // Main App component
        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            // Questionnaire state
            const [showQuestionnaire, setShowQuestionnaire] = useState(true);
            const [currentQuestion, setCurrentQuestion] = useState(0);

            // Filter states
            const [trackFilter, setTrackFilter] = useState([]);
            const [careerStageFilter, setCareerStageFilter] = useState([]);
            const [formatFilter, setFormatFilter] = useState([]);
            const [programTypeFilter, setProgramTypeFilter] = useState([]);
            const [durationFilter, setDurationFilter] = useState(null);
            const [timeFilter, setTimeFilter] = useState(null);
            const [geographicFilter, setGeographicFilter] = useState([]);
            const [applicationStatusFilter, setApplicationStatusFilter] = useState([]);
            const [applicationStatusSelection, setApplicationStatusSelection] = useState(null);
            const [careerSwitchFilter, setCareerSwitchFilter] = useState(false);
            const [careerSwitchSelection, setCareerSwitchSelection] = useState(null);

            // Fetch data on mount
            useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const parsed = parseCSV(text);
                        setData(parsed);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Extract unique options from data
            const trackOptions = useMemo(() =>
                [...new Set(data.map(d => d.track).filter(Boolean))], [data]);
            const careerStageOptions = useMemo(() => {
                const stages = new Set();
                data.forEach(d => {
                    if (d.career_stage) {
                        d.career_stage.split(',').forEach(s => stages.add(s.trim()));
                    }
                });
                return [...stages];
            }, [data]);
            const formatOptions = useMemo(() =>
                [...new Set(data.map(d => d.format).filter(Boolean))], [data]);
            const programTypeOptions = useMemo(() =>
                [...new Set(data.map(d => d.program_type).filter(Boolean))], [data]);
            const durationOptions = useMemo(() =>
                DURATION_ORDER.filter(d => data.some(item => item.duration === d)), [data]);
            const timeOptions = useMemo(() =>
                TIME_ORDER.filter(t => data.some(item => item.time_commitment === t)), [data]);
            const geographicOptions = useMemo(() =>
                [...new Set(data.map(d => d.geographic_focus).filter(Boolean))], [data]);
            const applicationStatusOptions = useMemo(() =>
                [...new Set(data.map(d => d.application_status).filter(Boolean))], [data]);

            // Questionnaire question groups
            const questionGroups = [
                // Group 1: Track + Geographic Focus
                [
                    {
                        question: "What track are you interested in?",
                        options: trackOptions,
                        filter: trackFilter,
                        setFilter: setTrackFilter,
                        isMulti: true,
                        isUpperBound: false
                    },
                    {
                        question: "What's your geographic preference?",
                        options: geographicOptions,
                        filter: geographicFilter,
                        setFilter: setGeographicFilter,
                        isMulti: true,
                        isUpperBound: false
                    }
                ],
                // Group 2: Career stage + Career switch
                [
                    {
                        question: "What's your career stage?",
                        options: careerStageOptions,
                        filter: careerStageFilter,
                        setFilter: setCareerStageFilter,
                        isMulti: true,
                        isUpperBound: false,
                        showNoPreference: false
                    },
                    {
                        question: "Are you coming from a different background and looking for a career switch?",
                        options: ['Yes', 'No'],
                        filter: careerSwitchSelection,
                        setFilter: (val) => {
                            setCareerSwitchSelection(val);
                            setCareerSwitchFilter(val === 'Yes');
                        },
                        isMulti: false,
                        isUpperBound: false,
                        showNoPreference: false
                    }
                ],
                // Group 3: Format + Application status
                [
                    {
                        question: "What format do you prefer?",
                        options: formatOptions,
                        filter: formatFilter,
                        setFilter: setFormatFilter,
                        isMulti: true,
                        isUpperBound: false
                    },
                    {
                        question: "Show only programs that start soon?",
                        options: ['Yes', 'No'],
                        filter: applicationStatusSelection,
                        setFilter: (val) => {
                            setApplicationStatusSelection(val);
                            setApplicationStatusFilter(val === 'Yes' ? ['Open now'] : []);
                        },
                        isMulti: false,
                        isUpperBound: false
                    }
                ],
                // Group 4: Time commitment + Duration
                [
                    {
                        question: "How much time can you commit?",
                        options: timeOptions,
                        filter: timeFilter,
                        setFilter: setTimeFilter,
                        isMulti: false,
                        isUpperBound: true
                    },
                    {
                        question: "What's the maximum duration you're looking for?",
                        options: durationOptions,
                        filter: durationFilter,
                        setFilter: setDurationFilter,
                        isMulti: false,
                        isUpperBound: true
                    }
                ]
            ];

            // Filter out groups where all questions have no options
            const activeGroups = questionGroups.map(group =>
                group.filter(q => q.options.length > 0)
            ).filter(group => group.length > 0);

            // Filter logic
            const filtered = useMemo(() => {
                return data.filter(item => {
                    if (trackFilter.length > 0) {
                        const itemTrack = item.track || '';
                        const matches = trackFilter.some(t =>
                            itemTrack === t ||
                            (itemTrack === 'Both' && (t === 'Technical' || t === 'Governance'))
                        );
                        if (!matches) return false;
                    }

                    if (careerStageFilter.length > 0) {
                        const itemStages = (item.career_stage || '').split(',').map(s => s.trim());
                        const matches = careerStageFilter.some(f => itemStages.includes(f));
                        if (!matches) return false;
                    }

                    if (formatFilter.length > 0) {
                        if (!formatFilter.includes(item.format)) return false;
                    }

                    if (programTypeFilter.length > 0) {
                        if (!programTypeFilter.includes(item.program_type)) return false;
                    }

                    if (durationFilter) {
                        const maxIdx = DURATION_ORDER.indexOf(durationFilter);
                        const itemIdx = DURATION_ORDER.indexOf(item.duration);
                        if (itemIdx === -1 || itemIdx > maxIdx) return false;
                    }

                    if (timeFilter) {
                        const maxIdx = TIME_ORDER.indexOf(timeFilter);
                        const itemIdx = TIME_ORDER.indexOf(item.time_commitment);
                        if (itemIdx === -1 || itemIdx > maxIdx) return false;
                    }

                    if (geographicFilter.length > 0) {
                        const itemGeo = item.geographic_focus || '';
                        // Global items always show, or match selected filters
                        if (itemGeo !== 'Global' && !geographicFilter.includes(itemGeo)) return false;
                    }

                    if (applicationStatusFilter.length > 0) {
                        if (!applicationStatusFilter.includes(item.application_status)) return false;
                    }

                    if (careerSwitchFilter) {
                        if (!item.career_switch || !item.career_switch.toLowerCase().includes('switcher')) {
                            return false;
                        }
                    }

                    return true;
                });
            }, [data, trackFilter, careerStageFilter, formatFilter, programTypeFilter, durationFilter, timeFilter, geographicFilter, applicationStatusFilter, careerSwitchFilter]);

            const clearFilters = () => {
                setTrackFilter([]);
                setCareerStageFilter([]);
                setFormatFilter([]);
                setProgramTypeFilter([]);
                setDurationFilter(null);
                setTimeFilter(null);
                setGeographicFilter([]);
                setApplicationStatusFilter([]);
                setApplicationStatusSelection(null);
                setCareerSwitchFilter(false);
                setCareerSwitchSelection(null);
            };

            const hasActiveFilters = trackFilter.length > 0 || careerStageFilter.length > 0 ||
                formatFilter.length > 0 || programTypeFilter.length > 0 ||
                durationFilter || timeFilter || geographicFilter.length > 0 ||
                applicationStatusFilter.length > 0 || careerSwitchFilter;

            const handleQuestionSelect = (questionIdx, option) => {
                const q = activeGroups[currentQuestion][questionIdx];
                if (q.isMulti) {
                    if (q.filter.includes(option)) {
                        q.setFilter(q.filter.filter(f => f !== option));
                    } else {
                        q.setFilter([...q.filter, option]);
                    }
                } else {
                    // For single-select (upper bound), toggle off if same
                    q.setFilter(q.filter === option ? null : option);
                }
            };

            const handleQuestionClear = (questionIdx) => {
                const q = activeGroups[currentQuestion][questionIdx];
                q.setFilter(q.isMulti ? [] : null);
            };

            const handleNext = () => {
                if (currentQuestion < activeGroups.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setShowQuestionnaire(false);
                }
            };

            const handleBack = () => {
                if (currentQuestion > 0) {
                    setCurrentQuestion(currentQuestion - 1);
                }
            };

            const handleShowAll = () => {
                clearFilters();
                setShowQuestionnaire(false);
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-nord-8 mx-auto mb-4"></div>
                            <p className="text-nord-4">Loading resources...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center text-nord-11">
                            <p className="text-xl mb-2">Failed to load data</p>
                            <p className="text-sm">{error}</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-nord-1 border-b border-nord-2">
                        <div className="max-w-6xl mx-auto px-4 py-6">
                            <div className="text-center">
                                <h1 className="text-2xl font-semibold text-nord-8">AI Safety Resources Directory</h1>
                                <p className="mt-3 text-sm text-nord-4">
                                    Find courses, fellowships, and programs to start your AI safety career. Answer a few questions or browse all resources.
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* Questionnaire or Main Content */}
                    {showQuestionnaire ? (
                        <div className="max-w-4xl mx-auto px-4 py-12">
                            <div className="mb-8 text-center">
                                <p className="text-nord-4 mb-4">
                                    Step {currentQuestion + 1} of {activeGroups.length}
                                </p>
                                <div className="flex justify-center gap-2 mb-8">
                                    {activeGroups.map((_, idx) => (
                                        <div
                                            key={idx}
                                            className={`h-2 w-12 rounded-full ${
                                                idx <= currentQuestion ? 'bg-nord-8' : 'bg-nord-2'
                                            }`}
                                        />
                                    ))}
                                </div>
                            </div>

                            {activeGroups[currentQuestion] && (
                                <QuestionGroupStep
                                    questions={activeGroups[currentQuestion]}
                                    onSelectFor={handleQuestionSelect}
                                    onClearFor={handleQuestionClear}
                                    onNext={handleNext}
                                    onBack={handleBack}
                                    canGoBack={currentQuestion > 0}
                                    matchCount={filtered.length}
                                    totalCount={data.length}
                                />
                            )}

                            <div className="text-center mt-16 pt-8 border-t border-nord-2">
                                <button
                                    onClick={handleShowAll}
                                    className="px-6 py-2 bg-nord-3 text-nord-5 rounded-lg hover:bg-nord-2 transition-colors"
                                >
                                    Show me all resources
                                </button>
                                <p className="mt-3 text-sm text-nord-4">
                                    Skip the questions and go to the filterable list of all resources
                                </p>
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-6xl mx-auto px-4 py-6">
                            <div className="lg:flex lg:gap-6">
                                {/* Filters sidebar */}
                                <aside className="lg:w-72 flex-shrink-0 mb-6 lg:mb-0">
                                    <div className="bg-nord-1 rounded-lg border border-nord-2 p-4 lg:sticky lg:top-4">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="font-semibold text-nord-6">Filters</h2>
                                            {hasActiveFilters && (
                                                <button
                                                    onClick={clearFilters}
                                                    className="text-sm text-nord-8 hover:underline"
                                                >
                                                    Clear all
                                                </button>
                                            )}
                                        </div>

                                        <FilterSection
                                            label="Track"
                                            options={trackOptions}
                                            selected={trackFilter}
                                            onChange={setTrackFilter}
                                        />

                                        <FilterSection
                                            label="Career Stage"
                                            options={careerStageOptions}
                                            selected={careerStageFilter}
                                            onChange={setCareerStageFilter}
                                        />

                                        <FilterSection
                                            label="Format"
                                            options={formatOptions}
                                            selected={formatFilter}
                                            onChange={setFormatFilter}
                                        />

                                        <FilterSection
                                            label="Program Type"
                                            options={programTypeOptions}
                                            selected={programTypeFilter}
                                            onChange={setProgramTypeFilter}
                                        />

                                        <FilterSection
                                            label="Geographic Focus"
                                            options={geographicOptions}
                                            selected={geographicFilter}
                                            onChange={setGeographicFilter}
                                        />

                                        <FilterSection
                                            label="Application Status"
                                            options={applicationStatusOptions}
                                            selected={applicationStatusFilter}
                                            onChange={setApplicationStatusFilter}
                                        />

                                        {durationOptions.length > 0 && (
                                            <UpperBoundFilter
                                                label="Max Duration"
                                                options={durationOptions}
                                                selected={durationFilter}
                                                onChange={setDurationFilter}
                                            />
                                        )}

                                        {timeOptions.length > 0 && (
                                            <UpperBoundFilter
                                                label="Max Time Commitment"
                                                options={timeOptions}
                                                selected={timeFilter}
                                                onChange={setTimeFilter}
                                            />
                                        )}

                                        <div className="mb-4">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input
                                                    type="checkbox"
                                                    checked={careerSwitchFilter}
                                                    onChange={(e) => setCareerSwitchFilter(e.target.checked)}
                                                    className="w-4 h-4 rounded border-nord-3 bg-nord-2 text-nord-14 focus:ring-nord-14"
                                                />
                                                <span className="text-sm text-nord-4">Focused on career switchers</span>
                                            </label>
                                        </div>

                                        <button
                                            onClick={() => {
                                                setShowQuestionnaire(true);
                                                setCurrentQuestion(0);
                                            }}
                                            className="w-full mt-2 px-4 py-2 text-sm text-nord-4 bg-nord-2 rounded-lg hover:bg-nord-3 transition-colors"
                                        >
                                            ← Back to questionnaire
                                        </button>
                                    </div>
                                </aside>

                                {/* Results */}
                                <main className="flex-1">
                                    <div className="mb-4 flex items-center justify-between">
                                        <p className="text-nord-4">
                                            Showing <span className="font-semibold text-nord-6">{filtered.length}</span> of {data.length} resources
                                        </p>
                                    </div>

                                    {filtered.length === 0 ? (
                                        <div className="bg-nord-1 rounded-lg border border-nord-2 p-8 text-center">
                                            <p className="text-nord-4 mb-4">No resources match your filters.</p>
                                            <button
                                                onClick={clearFilters}
                                                className="text-nord-8 hover:underline"
                                            >
                                                Clear all filters
                                            </button>
                                        </div>
                                    ) : (
                                        <div>
                                            {filtered.map((item, idx) => (
                                                <ResourceCard key={idx} item={item} />
                                            ))}
                                        </div>
                                    )}
                                </main>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-nord-1 border-t border-nord-2 mt-12">
                        <div className="max-w-6xl mx-auto px-4 py-6 text-sm">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4 text-center md:text-left">
                                <div className="text-nord-4">
                                    <p className="mb-1">Data may not be fully up to date.</p>
                                    <p>
                                        Something missing or incorrect?{' '}
                                        <a href="mailto:temp.dividend407@passmail.net" className="text-nord-8 hover:underline">
                                            Let us know
                                        </a>
                                    </p>
                                </div>
                                <div className="text-nord-4 md:text-right">
                                    <p>Privately maintained by <a href="https://nielsdoehring.de" className="text-nord-8 hover:underline">Niels Doehring</a></p>
                                    <p className="text-xs">Last updated: January 2026</p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
