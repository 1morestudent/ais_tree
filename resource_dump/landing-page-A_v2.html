<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Safety Navigator</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --nord-bg:        #2E3440;
    --nord-bg-2:      #3B4252;
    --nord-bg-3:      #434C5E;
    --nord-bg-4:      #4C566A;
    --nord-fg:        #ECEFF4;
    --nord-fg-2:      #E5E9F0;
    --nord-fg-dim:    #D8DEE9;
    --nord-muted:     #8a93a4;
    --frost-1:        #8FBCBB;
    --frost-2:        #88C0D0;
    --pop-1:          #5EE6D8;
    --pop-2:          #36C5C0;
  }
  html, body {
    margin: 0; padding: 0;
    background: #262b35;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--nord-fg);
    overflow: hidden;
  }
  /* Hero is designed at 1440 × 900 — wrapper scales it to fit any viewport,
     letterboxing the rest. Below-the-fold sections can replace this later. */
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: #262b35;
  }
  #hero {
    width: 1440px;
    height: 900px;
    transform-origin: center center;
  }
</style>
</head>
<body>
<div id="stage"><div id="hero"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const HERO_W = 1440;
const HERO_H = 900;

function BrandMark({ size = 28, color = 'var(--pop-1)' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={{ display: 'block' }}>
      <circle cx="16" cy="16" r="13" fill="none" stroke={color} strokeWidth="1.5" opacity="0.55" />
      <circle cx="16" cy="16" r="7" fill="none" stroke={color} strokeWidth="1.5" />
      <line x1="16" y1="2" x2="16" y2="6" stroke={color} strokeWidth="1.5" />
      <line x1="16" y1="26" x2="16" y2="30" stroke={color} strokeWidth="1.5" />
      <line x1="2" y1="16" x2="6" y2="16" stroke={color} strokeWidth="1.5" />
      <line x1="26" y1="16" x2="30" y2="16" stroke={color} strokeWidth="1.5" />
      <circle cx="20.5" cy="11.5" r="2" fill={color} />
    </svg>
  );
}

function BrandLockup() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <BrandMark />
      <span style={{
        fontFamily: 'Inter, sans-serif',
        fontWeight: 600, fontSize: 16, letterSpacing: 0.2,
        color: 'var(--nord-fg-2)',
      }}>AI Safety Navigator</span>
    </div>
  );
}

function PrimaryCTA({ children, style = {} }) {
  return (
    <a href="navigator.html" style={{
      display: 'inline-flex', alignItems: 'center', gap: 12,
      padding: '20px 36px',
      borderRadius: 999,
      background: 'linear-gradient(180deg, #6FF0E1 0%, #36C5C0 100%)',
      color: '#0d1f24',
      fontFamily: 'Inter, sans-serif',
      fontWeight: 600, fontSize: 17, letterSpacing: 0.1,
      textDecoration: 'none',
      boxShadow: '0 14px 40px -8px rgba(94, 230, 216, 0.65), 0 0 0 1px rgba(120, 245, 230, 0.55) inset',
      ...style,
    }}>
      <span>Open the Navigator</span>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3.5 9h11M10 4.5L14.5 9 10 13.5" stroke="#0d1f24" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    </a>
  );
}

function Eyebrow({ children }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '6px 12px',
      borderRadius: 999,
      border: '1px solid rgba(143, 188, 187, 0.3)',
      background: 'rgba(143, 188, 187, 0.06)',
      color: 'var(--frost-1)',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--frost-1)' }} />
      {children}
    </div>
  );
}

function TopNav() {
  const linkStyle = {
    color: 'var(--nord-fg-dim)', fontFamily: 'Inter, sans-serif',
    fontSize: 14, opacity: 0.75, cursor: 'pointer', textDecoration: 'none',
  };
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '1fr auto 1fr',
      alignItems: 'center',
      padding: '24px 48px',
    }}>
      <div style={{ justifySelf: 'start' }}>
        <BrandLockup />
      </div>
      <div style={{
        justifySelf: 'center',
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 11, letterSpacing: 1.4, textTransform: 'uppercase',
        color: 'var(--nord-muted)',
      }}>
        Updated weekly
      </div>
      <div style={{ justifySelf: 'end', display: 'flex', alignItems: 'center', gap: 28 }}>
        <a style={linkStyle}>About</a>
        <a style={linkStyle}>Contact</a>
      </div>
    </div>
  );
}

function BelowFoldHint() {
  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0,
      padding: '20px 48px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      borderTop: '1px dashed rgba(143, 188, 187, 0.18)',
      color: 'var(--nord-muted)',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11, letterSpacing: 1, textTransform: 'uppercase',
    }}>
      <span>↓ scroll · future sections live here</span>
      <span style={{ opacity: 0.7 }}>maintained by saige incubator · 2026</span>
    </div>
  );
}

function Hero() {
  return (
    <div style={{
      position: 'relative', width: HERO_W, height: HERO_H,
      background: 'radial-gradient(ellipse at 50% 30%, #353c4a 0%, #2E3440 55%, #262b35 100%)',
      overflow: 'hidden',
      fontFamily: 'Inter, sans-serif',
      display: 'flex', flexDirection: 'column',
    }}>
      <TopNav />

      {/* Vertically centered hero content */}
      <div style={{
        flex: 1,
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: '0 96px',
        paddingBottom: 60,
      }}>
        <div style={{
          display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 28,
        }}>
          <h1 style={{
            margin: 0,
            fontFamily: "'Source Serif 4', 'Source Serif Pro', Georgia, serif",
            fontWeight: 500, fontSize: 92, lineHeight: 1.02, letterSpacing: -1.8,
            color: 'var(--nord-fg)', maxWidth: 1100, textWrap: 'pretty',
          }}>
            Find your next step <br />
            in <span style={{ color: 'var(--pop-1)' }}>AI&nbsp;safety</span>.
          </h1>

          <p style={{
            margin: 0, fontSize: 20, lineHeight: 1.5,
            color: 'var(--nord-fg-dim)', maxWidth: 620, textWrap: 'pretty', opacity: 0.85,
          }}>
            A filterable directory of opportunities, built to help you find
            the ones that fit your background, hours and timeline.
          </p>

          <div style={{ display: 'flex', alignItems: 'center', gap: 24, marginTop: 20, position: 'relative' }}>
            <div style={{
              position: 'absolute', left: -28, top: -16, bottom: -16,
              width: 320,
              background: 'radial-gradient(ellipse at center, rgba(94,230,216,0.38) 0%, transparent 70%)',
              filter: 'blur(22px)', pointerEvents: 'none',
            }} />
            <PrimaryCTA />
          </div>
        </div>
      </div>

      {/* Horizon hairline just above the footer band */}
      <div style={{
        position: 'absolute', left: 48, right: 48, bottom: 110, height: 1,
        background: 'linear-gradient(90deg, transparent 0%, rgba(143,188,187,0.22) 30%, rgba(143,188,187,0.22) 70%, transparent 100%)',
      }} />
      <div style={{
        position: 'absolute', left: 48, right: 48, bottom: 110,
        display: 'flex', justifyContent: 'space-between', pointerEvents: 'none',
      }}>
        {Array.from({ length: 13 }).map((_, i) => (
          <div key={i} style={{
            width: 1, height: i === 6 ? 14 : 6,
            background: 'rgba(143,188,187,0.3)',
            transform: 'translateY(-2px)',
          }} />
        ))}
      </div>

      <BelowFoldHint />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('hero')).render(<Hero />);

// Scale-to-fit so the 1440×900 design fills any viewport (letterboxed on black).
function rescale() {
  const stage = document.getElementById('hero');
  const s = Math.min(window.innerWidth / HERO_W, window.innerHeight / HERO_H);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', rescale);
rescale();
</script>
</body>
</html>
